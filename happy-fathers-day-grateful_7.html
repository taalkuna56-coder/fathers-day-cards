<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day, Ayya</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@500;600&display=swap');

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(ellipse at top, #4a2738 0%, #28121e 70%);
    font-family:'Manrope',sans-serif;
    color:#fbf2e9;
    overflow:hidden;
  }

  .stage{
    min-height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:24px;
    text-align:center;
  }

  .sparkle-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:2;
  }

  .sparkle{
    position:absolute;
    border-radius:50%;
    background:#fff;
    opacity:0;
    animation:twinkle ease-in-out infinite;
  }

  @keyframes twinkle{
    0%, 100%{opacity:0; transform:scale(.4);}
    50%{opacity:.95; transform:scale(1);}
  }

  .heart-shape{
    position:relative;
    width:min(300px, 64vw);
    height:min(280px, 60vw);
    opacity:0;
    transform:scale(.2);
    animation:popIn .7s cubic-bezier(.2,1.4,.4,1) forwards .15s;
    filter:drop-shadow(0 18px 40px rgba(0,0,0,.45));
    z-index:5;
  }

  .heart-shape svg{
    width:100%;
    height:100%;
    display:block;
  }

  .heart-img{
    width:100%;
    height:100%;
  }

  .heart-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-46%);
    width:62%;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(13px,2.6vw,16px);
    line-height:1.35;
    color:#fff8f0;
    text-shadow:0 1px 6px rgba(0,0,0,.35);
  }

  @keyframes popIn{
    0%{opacity:0; transform:scale(.2) rotate(-8deg);}
    55%{opacity:1; transform:scale(1.12) rotate(3deg);}
    75%{transform:scale(.94) rotate(-2deg);}
    100%{opacity:1; transform:scale(1) rotate(0deg);}
  }

  .line{
    margin-top:28px;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(22px,5.2vw,34px);
    letter-spacing:.01em;
    color:#fbf2e9;
    opacity:0;
    animation:fadeUp .7s ease forwards .55s;
    position:relative;
    z-index:5;
  }

  .line em{
    font-style:italic;
    color:#d9a23b;
  }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  .burst-heart, .burst-flower{
    position:fixed;
    top:0; left:0;
    pointer-events:none;
    z-index:50;
    will-change:transform, opacity;
  }

  .firework{
    position:fixed;
    top:0; left:0;
    width:6px;
    height:6px;
    border-radius:50%;
    pointer-events:none;
    z-index:40;
    will-change:transform, opacity;
  }

  .tap-hint{
    margin-top:18px;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:rgba(251,242,233,.5);
    opacity:0;
    animation:fadeUp .7s ease forwards 1.4s;
    position:relative;
    z-index:5;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; transition-duration:.01ms !important;}
  }
</style>
</head>

function playChime(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const start = now + i*0.09;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.12, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.5);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start + 0.55);
    });
  }catch(e){}
}

// Ambient twinkling sparkles scattered across the page
function spawnAmbientSparkles(){
  const layer = document.getElementById('sparkleLayer');
  layer.innerHTML = '';
  const count = 34;
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 2 + Math.random()*4;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.boxShadow = `0 0 ${size*2}px ${size}px rgba(255,255,255,0.5)`;
    s.style.animationDuration = (1.6 + Math.random()*2.4) + 's';
    s.style.animationDelay = (Math.random()*3) + 's';
    layer.appendChild(s);
  }
}

function createBurstHeart(x, y){
  const heart = document.createElement('div');
  heart.className = 'burst-heart';
  const size = 8 + Math.random()*16;
  const color = heartColors[Math.floor(Math.random()*heartColors.length)];
  heart.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 32 29.6" fill="${color}"><path d="M23.6,0c-3.4,0-6.3,2.1-7.6,5.1C14.7,2.1,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,5.2,4.6,8.9,11.5,14.9L16,27.3l4.5-4.1C27.4,17.3,32,13.6,32,8.4C32,3.8,28.2,0,23.6,0z"/></svg>`;
  document.body.appendChild(heart);

  const angle = Math.random() * Math.PI * 2;
  const distance = 60 + Math.random() * 220;
  const dx = Math.cos(angle) * distance;
  const dy = Math.sin(angle) * distance;
  const duration = 700 + Math.random()*600;
  const rotate = (Math.random()-0.5)*360;

  heart.style.left = x + 'px';
  heart.style.top = y + 'px';
  heart.style.opacity = '1';
  heart.style.transform = 'translate(-50%,-50%) scale(0) rotate(0deg)';

  requestAnimationFrame(()=>{
    heart.style.transition = `transform ${duration}ms cubic-bezier(.2,.7,.3,1), opacity ${duration}ms ease`;
    heart.style.transform = `translate(${dx-size/2}px, ${dy-size/2}px) scale(1) rotate(${rotate}deg)`;
    heart.style.opacity = '0';
  });

  setTimeout(()=> heart.remove(), duration + 100);
}

// Simple 5-petal flower as inline SVG
function createBurstFlower(x, y){
  const flower = document.createElement('div');
  flower.className = 'burst-flower';
  const size = 12 + Math.random()*16;
  const petalColor = flowerColors[Math.floor(Math.random()*flowerColors.length)];
  flower.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
    <g fill="${petalColor}">
      <ellipse cx="50" cy="22" rx="14" ry="22"/>
      <ellipse cx="78" cy="50" rx="22" ry="14"/>
      <ellipse cx="50" cy="78" rx="14" ry="22"/>
      <ellipse cx="22" cy="50" rx="22" ry="14"/>
    </g>
    <circle cx="50" cy="50" r="12" fill="#f4d35e"/>
  </svg>`;
  document.body.appendChild(flower);

  const angle = Math.random() * Math.PI * 2;
  const distance = 60 + Math.random() * 220;
  const dx = Math.cos(angle) * distance;
  const dy = Math.sin(angle) * distance;
  const duration = 800 + Math.random()*700;
  const rotate = (Math.random()-0.5)*420;

  flower.style.left = x + 'px';
  flower.style.top = y + 'px';
  flower.style.opacity = '1';
  flower.style.transform = 'translate(-50%,-50%) scale(0) rotate(0deg)';

  requestAnimationFrame(()=>{
    flower.style.transition = `transform ${duration}ms cubic-bezier(.2,.7,.3,1), opacity ${duration}ms ease`;
    flower.style.transform = `translate(${dx-size/2}px, ${dy-size/2}px) scale(1) rotate(${rotate}deg)`;
    flower.style.opacity = '0';
  });

  setTimeout(()=> flower.remove(), duration + 100);
}

function heartBurst(cx, cy, count){
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(Math.random() > 0.45){
        createBurstHeart(cx, cy);
      } else {
        createBurstFlower(cx, cy);
      }
    }, i * 12);
  }
}

// Firework: a shell rises from a side then explodes into a ring of particles
function launchFirework(originX, originY, targetX, targetY){
  const shell = document.createElement('div');
  shell.className = 'firework';
  const color = fwColors[Math.floor(Math.random()*fwColors.length)];
  shell.style.background = color;
  shell.style.boxShadow = `0 0 8px 2px ${color}`;
  document.body.appendChild(shell);

  shell.style.left = originX + 'px';
  shell.style.top = originY + 'px';
  shell.style.opacity = '1';

  const riseDuration = 500 + Math.random()*250;
  requestAnimationFrame(()=>{
    shell.style.transition = `transform ${riseDuration}ms cubic-bezier(.25,.46,.45,.94)`;
    shell.style.transform = `translate(${targetX-originX}px, ${targetY-originY}px)`;
  });

  setTimeout(()=>{
    shell.remove();
    explodeFirework(targetX, targetY, color);
  }, riseDuration);
}

function explodeFirework(x, y, color){
  const particleCount = 34;
  for(let i=0;i<particleCount;i++){
    const p = document.createElement('div');
    p.className = 'firework';
    const size = 3 + Math.random()*3;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = color;
    p.style.boxShadow = `0 0 6px 1px ${color}`;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.opacity = '1';
    document.body.appendChild(p);

    const angle = (Math.PI * 2 * i) / particleCount + (Math.random()*0.3);
    const distance = 55 + Math.random()*85;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance + 20; // slight gravity drop
    const duration = 650 + Math.random()*350;

    requestAnimationFrame(()=>{
      p.style.transition = `transform ${duration}ms cubic-bezier(.15,.6,.35,1), opacity ${duration}ms ease`;
      p.style.transform = `translate(${dx}px, ${dy}px) scale(0.3)`;
      p.style.opacity = '0';
    });

    setTimeout(()=> p.remove(), duration + 100);
  }
  // small flash at burst point
  const flash = document.createElement('div');
  flash.className = 'firework';
  flash.style.width = '4px';
  flash.style.height = '4px';
  flash.style.left = x + 'px';
  flash.style.top = y + 'px';
  flash.style.background = '#ffffff';
  flash.style.boxShadow = `0 0 30px 14px ${color}`;
  flash.style.opacity = '0.9';
  document.body.appendChild(flash);
  requestAnimationFrame(()=>{
    flash.style.transition = 'opacity 350ms ease, transform 350ms ease';
    flash.style.transform = 'scale(3)';
    flash.style.opacity = '0';
  });
  setTimeout(()=> flash.remove(), 400);
}

function fireworksShow(){
  const w = window.innerWidth;
  const h = window.innerHeight;
  const leftX = w * 0.06;
  const rightX = w * 0.94;

  const bursts = [
    {side:'left',  delay:0,    targetY: h*0.26},
    {side:'right', delay:140,  targetY: h*0.20},
    {side:'left',  delay:340,  targetY: h*0.42},
    {side:'right', delay:480,  targetY: h*0.48},
    {side:'left',  delay:700,  targetY: h*0.18},
    {side:'right', delay:820,  targetY: h*0.36},
    {side:'left',  delay:1050, targetY: h*0.5},
    {side:'right', delay:1180, targetY: h*0.24},
  ];

  bursts.forEach(b=>{
    setTimeout(()=>{
      const originX = b.side === 'left' ? leftX : rightX;
      const targetX = b.side === 'left' ? w * (0.18 + Math.random()*0.14) : w * (0.68 + Math.random()*0.14);
      launchFirework(originX, h, targetX, b.targetY);
    }, b.delay);
  });
}

function celebrate(count){
  const r = document.querySelector('.heart-shape').getBoundingClientRect();
  const cx = r.left + r.width/2 || window.innerWidth/2;
  const cy = r.top + r.height/2 || window.innerHeight/2;
  heartBurst(cx, cy, count);
  fireworksShow();
  playChime();
}

let firstCelebrationDone = false;

function startCelebration(){
  if(firstCelebrationDone) return;
  firstCelebrationDone = true;
  spawnAmbientSparkles();
  celebrate(55);
}

function tryStartSoon(){
  // Multiple overlapping triggers so it fires the moment the page is
  // actually visible and ready, no matter how the browser throttles us.
  requestAnimationFrame(()=>{
    requestAnimationFrame(startCelebration);
  });
  setTimeout(startCelebration, 150);
  setTimeout(startCelebration, 500);
  setTimeout(startCelebration, 1200);
}

spawnAmbientSparkles();

if(document.readyState === 'complete'){
  tryStartSoon();
} else {
  window.addEventListener('load', tryStartSoon);
  document.addEventListener('DOMContentLoaded', tryStartSoon);
}

document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible'){
    startCelebration();
  }
});

// Some in-app browsers (WhatsApp, Instagram, etc.) restrict autoplay timers,
// so re-fire on pageshow (covers cached/back-forward navigations) too.
window.addEventListener('pageshow', tryStartSoon);

// Tapping celebrates immediately the first time (if it somehow hasn't
// fired yet) and replays it freely every time after that.
document.getElementById('stage').addEventListener('click', ()=>{
  if(!firstCelebrationDone){
    startCelebration();
  } else {
    celebrate(40);
  }
});

// Belt-and-suspenders: ANY first tap/touch anywhere on the page guarantees
// the celebration fires, even in restrictive in-app browser webviews where
// autoplay-on-load JS can be delayed or blocked entirely.
['touchstart','pointerdown'].forEach(function(evt){
  document.addEventListener(evt, function(){
    startCelebration();
  }, {once:true, passive:true});
});
</script>
